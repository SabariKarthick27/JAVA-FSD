<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="16" fill="url(#bg)" />
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
  </defs>
  
  <!-- Code brackets -->
  <path d="M 60,70 L 30,100 L 60,130" fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 140,70 L 170,100 L 140,130" fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <line x1="115" y1="60" x2="85" y2="140" stroke="#f1f5f9" stroke-width="8" stroke-linecap="round" />
  
  <!-- Mini sparks/circles -->
  <circle cx="100" cy="40" r="4" fill="#38bdf8" />
  <circle cx="50" cy="160" r="6" fill="#f1f5f9" opacity="0.3" />
  <circle cx="150" cy="160" r="5" fill="#38bdf8" opacity="0.5" />
</svg>
