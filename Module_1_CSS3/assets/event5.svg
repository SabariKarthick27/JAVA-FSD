<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="16" fill="url(#bg)" />
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532d" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
  </defs>
  
  <!-- Flower Plant Leaf Graphic -->
  <path d="M 100,160 Q 100,50 100,40" fill="none" stroke="#fef08a" stroke-width="6" stroke-linecap="round" />
  
  <!-- Leaf Left -->
  <path d="M 100,120 C 100,120 60,100 65,80 C 70,60 100,100 100,100" fill="url(#leaf)" />
  <!-- Leaf Right -->
  <path d="M 100,90 C 100,90 140,70 135,50 C 130,30 100,70 100,70" fill="url(#leaf)" />
  
  <circle cx="100" cy="40" r="10" fill="#fef08a" />
  <circle cx="130" cy="130" r="4" fill="#a7f3d0" opacity="0.4" />
  <circle cx="70" cy="150" r="5" fill="#a7f3d0" opacity="0.3" />
</svg>
