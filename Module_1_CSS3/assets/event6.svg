<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="16" fill="url(#bg)" />
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
    <linearGradient id="shoe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
  </defs>
  
  <!-- Running Shoe / Wings Outline -->
  <path d="M 40,120 C 40,120 50,110 70,110 C 90,110 110,130 130,130 C 150,130 160,110 160,110 L 165,120 C 165,120 145,145 125,145 C 105,145 80,125 65,125 C 50,125 40,135 40,135 Z" fill="url(#shoe)" />
  <path d="M 120,110 L 105,80 C 105,80 90,75 80,90 L 70,110" fill="none" stroke="#facc15" stroke-width="4" stroke-linecap="round" />
  
  <!-- Dynamic lines representing speed -->
  <line x1="30" y1="90" x2="60" y2="90" stroke="#f1f5f9" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  <line x1="25" y1="105" x2="50" y2="105" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  <line x1="35" y1="75" x2="55" y2="75" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round" opacity="0.5" />
</svg>
