<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="16" fill="url(#bg)" />
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#451a03" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
    <linearGradient id="pot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  
  <!-- Pottery Vase Outline -->
  <path d="M 60,60 C 60,60 50,40 100,40 C 150,40 140,60 140,60 C 140,60 150,90 150,110 C 150,140 130,150 130,150 L 70,150 C 70,150 50,140 50,110 C 50,90 60,60 60,60 Z" fill="url(#pot)" />
  <ellipse cx="100" cy="45" rx="25" ry="5" fill="#fef3c7" opacity="0.8" />
  
  <!-- Decorative swirls on pot -->
  <path d="M 52,105 Q 100,120 148,105" fill="none" stroke="#fef3c7" stroke-width="4" stroke-linecap="round" opacity="0.7" />
  <path d="M 55,120 Q 100,135 145,120" fill="none" stroke="#fef3c7" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  
  <circle cx="100" cy="80" r="8" fill="#fef3c7" opacity="0.9" />
</svg>
